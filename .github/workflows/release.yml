name: Release Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-main:
    runs-on: ubuntu-latest
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      CENTRAL_NAMESPACE: io.github.willmortimer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build main repo
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish main modules
        run: ./gradlew publishAll
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish main modules to Maven Central
        if: ${{ env.CENTRAL_PORTAL_USERNAME != '' && env.CENTRAL_PORTAL_PASSWORD != '' && env.SIGNING_KEY != '' }}
        run: ./gradlew releaseToCentralPortal

      - name: Upload CLI distributions to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            qrgen-cli/build/distributions/*.zip
            qrgen-cli/build/distributions/*.tar

  publish-plugin:
    runs-on: ubuntu-latest
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      CENTRAL_NAMESPACE: io.github.willmortimer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish standalone Gradle plugin
        run: ./gradlew -p qrgen-gradle-plugin build publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish standalone Gradle plugin to Maven Central
        if: ${{ env.CENTRAL_PORTAL_USERNAME != '' && env.CENTRAL_PORTAL_PASSWORD != '' && env.SIGNING_KEY != '' }}
        run: ./gradlew -p qrgen-gradle-plugin releaseToCentralPortal
